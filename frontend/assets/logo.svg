<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <path d="M30 20 H70 L60 30 H40 V70 L30 80 V20 Z" fill="none" stroke="#00f0ff" stroke-width="2" filter="url(#glow)" />
  <path d="M50 40 L60 50 L50 60 L40 50 Z" fill="#00f0ff" filter="url(#glow)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" />
  </path>
  <text x="50" y="95" text-anchor="middle" fill="#00f0ff" font-family="Share Tech Mono" font-size="12" filter="url(#glow)">J.A.R.V.I.S.</text>
</svg>
