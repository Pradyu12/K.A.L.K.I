<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB300" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#FF8F00" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFB300" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <polygon points="60,10 90,40 60,70 30,40" fill="none" stroke="url(#g1)" stroke-width="1.5">
      <animateTransform attributeName="transform" type="rotate" from="0 60 40" to="360 60 40" dur="12s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="60,25 75,40 60,55 45,40" fill="url(#g1)" opacity="0.15">
      <animate attributeName="opacity" values="0.15;0.3;0.15" dur="3s" repeatCount="indefinite"/>
    </polygon>
    <line x1="60" y1="10" x2="60" y2="70" stroke="url(#g2)" stroke-width="0.8" opacity="0.5"/>
    <line x1="30" y1="40" x2="90" y2="40" stroke="url(#g2)" stroke-width="0.8" opacity="0.5"/>
    <circle cx="60" cy="40" r="2" fill="#FFB300" filter="url(#glowSoft)">
      <animate attributeName="r" values="2;3;2" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="60" y="100" text-anchor="middle" fill="#FFB300" font-family="'Rajdhani','Share Tech Mono',monospace" font-size="9" font-weight="700" letter-spacing="4" filter="url(#glow)" opacity="0.9">
    SUDARSHANA
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </text>
</svg>
