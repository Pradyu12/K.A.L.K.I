<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <!-- Stylized Sword/Vajra Logo for KALKI -->
    <defs>
        <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ffcc00;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ff9933;stop-opacity:1" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Central Blade -->
    <path d="M50 5 L58 40 L50 95 L42 40 Z" fill="url(#goldGradient)" filter="url(#glow)" />

    <!-- Crossguard -->
    <path d="M30 45 L70 45 L70 50 L30 50 Z" fill="#ffcc00" />

    <!-- Decorative Wings/Energy -->
    <path d="M50 45 Q70 20 85 45" fill="none" stroke="#ff9933" stroke-width="2" opacity="0.6" />
    <path d="M50 45 Q30 20 15 45" fill="none" stroke="#ff9933" stroke-width="2" opacity="0.6" />

    <!-- Central Core Symbol -->
    <circle cx="50" cy="47.5" r="5" fill="#fff" filter="url(#glow)" />
</svg>
