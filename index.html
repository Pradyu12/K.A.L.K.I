<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALKI HUD</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body class="state-idle">
    <div class="background-overlay"></div>

    <header class="hud-header">
        <img src="logo.svg" alt="KALKI Logo" class="main-logo">
        <div class="header-status">CORE_ACTIVE | PROTOCOL_V3.1</div>
    </header>

    <main class="hud-container">
        <!-- Left Panel: Telemetry & Missions -->
        <section class="panel side-panel left-panel">
            <div class="panel-header">MISSION_LOG</div>
            <div class="mission-list" id="missionList">
                <!-- Tasks will be injected here -->
                <div class="mission-item">INITIALIZING ARCHIVES...</div>
            </div>

            <div class="panel-header" style="margin-top: 20px;">SYSTEM_METRICS</div>
            <div class="metric-group">
                <div class="metric-label">CPU_LOAD</div>
                <div class="progress-bar"><div class="bar" style="width: 14%;"></div></div>
            </div>
            <div class="metric-group">
                <div class="metric-label">MEM_ALLOC</div>
                <div class="progress-bar"><div class="bar" style="width: 32%;"></div></div>
            </div>
            <div class="log-container" id="terminalLogs">
                <div class="log-entry">> INITIALIZING KALKI CORE...</div>
            </div>
        </section>

        <!-- Central Core -->
        <section class="central-core">
            <div class="arc-reactor" id="arcReactor">
                <div class="ring ring-outer"></div>
                <div class="ring ring-middle-outer"></div>
                <div class="ring ring-middle"></div>
                <div class="ring ring-inner"></div>
                <div class="core-glow"></div>
                <canvas id="coreCanvas"></canvas>
            </div>
            <div class="status-text" id="statusText">SYSTEM READY</div>
            <div class="transcript" id="transcriptText"></div>
        </section>

        <!-- Right Panel: Topology & Archives -->
        <section class="panel side-panel right-panel">
            <div class="panel-header">ARCHIVE_INDEX</div>
            <div class="file-browser" id="fileBrowser">
                <div class="file-item">> main.py</div>
                <div class="file-item">> database.py</div>
                <div class="file-item">> index.html</div>
                <div class="file-item">> style.css</div>
                <div class="file-item">> app.js</div>
            </div>

            <div class="panel-header" style="margin-top: 20px;">SECURITY_PROTOCOL</div>
            <div class="firewall-grid">
                <div class="scan-line"></div>
            </div>
            <div class="security-status">
                <span class="label">FIREWALL:</span> <span class="status-active">ACTIVE</span>
            </div>
            <div class="security-status">
                <span class="label">ENCRYPTION:</span> <span class="status-active">AES-256</span>
            </div>
            <div class="panel-footer">
                <button id="btnListen" class="fui-button">INITIATE VOICE</button>
                <button id="btnSimulate" class="fui-button secondary">MOCK COMMAND</button>
            </div>
        </section>
    </main>

    <div class="response-overlay" id="kalkiResponse"></div>

    <script src="app.js"></script>
</body>
</html>
